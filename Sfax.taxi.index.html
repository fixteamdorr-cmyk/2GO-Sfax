<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2GO - سائقي صفاقس</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; overflow-x: hidden; }
        .driver-card { border-radius: 20px; }
        /* Modal Style */
        #install-modal { display: none; }
        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col bg-gray-50">

    <!-- Install Prompt Modal -->
    <div id="install-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/70 backdrop-blur-sm">
        <div class="bg-white w-full rounded-[30px] p-8 text-center shadow-2xl animate-bounce-slow">
            <div class="w-20 h-20 bg-yellow-400 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-taxi text-4xl text-black"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">ثبت تطبيق 2GO</h2>
            <p class="text-gray-600 mb-6 text-lg">أضف التطبيق لشاشتك الرئيسية لتلقي الطلبات بسرعة وسهولة في صفاقس.</p>
            <button id="install-button" class="w-full bg-yellow-400 text-black font-bold py-4 rounded-xl text-xl shadow-md hover:bg-yellow-500 transition-all mb-3">
                تثبيت الآن
            </button>
            <button onclick="closeModal()" class="text-gray-400 text-sm underline">لاحقاً، سأستخدم المتصفح</button>
        </div>
    </div>

    <!-- App Header -->
    <header class="bg-white p-4 flex justify-between items-center shadow-sm sticky top-0 z-40">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-yellow-400 rounded-lg flex items-center justify-center shadow">
                <i class="fas fa-taxi text-black"></i>
            </div>
            <span class="text-xl font-black text-gray-800">2GO <span class="text-yellow-500">SFAX</span></span>
        </div>
        <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">متصل</div>
    </header>

    <!-- Main Content -->
    <main class="p-4 space-y-4">
        <div class="bg-zinc-900 text-white p-6 driver-card shadow-xl">
            <h2 class="opacity-70">مرحباً كابتن،</h2>
            <p class="text-2xl font-bold">جاهز للعمل اليوم؟</p>
            <div class="mt-4 flex gap-4">
                <div class="bg-white/10 p-3 rounded-xl flex-1 text-center">
                    <span class="block text-xs opacity-60">الرحلات</span>
                    <span class="text-lg font-bold">12</span>
                </div>
                <div class="bg-white/10 p-3 rounded-xl flex-1 text-center">
                    <span class="block text-xs opacity-60">المحفظة</span>
                    <span class="text-lg font-bold text-yellow-400">45 DT</span>
                </div>
            </div>
        </div>

        <!-- AI Assistant -->
        <div class="bg-white p-4 driver-card shadow-sm border border-gray-100">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                <span class="font-bold text-gray-700">مساعد 2GO الذكي</span>
            </div>
            <div id="ai-response" class="text-sm text-gray-600 mb-3 leading-relaxed">
                مرحباً! يمكنني مساعدتك في معرفة أخبار الطرقات في صفاقس أو الرد على استفسارات الركاب.
            </div>
            <div class="flex gap-2">
                <input type="text" id="ai-input" placeholder="اسألني أي شيء..." class="flex-1 bg-gray-100 border-none p-3 rounded-xl text-sm focus:ring-2 focus:ring-yellow-400 outline-none">
                <button onclick="callGemini()" class="bg-yellow-400 px-4 rounded-xl shadow-sm"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        // Gemini API Config
        const API_KEY = "AlzaSyBdLu22ps9RWR8dlPoyej bHsYmTlBkCu8A".replace(/\s/g, ''); 

        async function callGemini() {
            const input = document.getElementById('ai-input');
            const responseArea = document.getElementById('ai-response');
            if(!input.value) return;
            
            const prompt = input.value;
            input.value = "";
            responseArea.innerText = "جاري التفكير...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                responseArea.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                responseArea.innerText = "تعذر الاتصال بالذكاء الاصطناعي.";
            }
        }

        // PWA Install Logic
        let deferredPrompt;
        const modal = document.getElementById('install-modal');
        const installBtn = document.getElementById('install-button');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            modal.style.display = 'flex'; // إظهار النافذة المنبثقة
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                modal.style.display = 'none';
            }
        });

        function closeModal() { modal.style.display = 'none'; }
    </script>
</body>
</html>
